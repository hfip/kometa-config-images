<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fusion Collections Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#fff; font-family:'Cairo',sans-serif; padding:20px 14px 40px; }
h1 { text-align:center; font-size:1.5rem; font-weight:900; background:linear-gradient(135deg,#e50914,#ff6b35); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.sub { text-align:center; color:#888; font-size:0.85rem; margin-bottom:20px; }
.stats { display:flex; gap:10px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
.stat { background:#111120; border:1px solid #222; border-radius:12px; padding:10px 18px; text-align:center; }
.stat .n { font-size:1.6rem; font-weight:900; color:#e50914; }
.stat .l { font-size:0.75rem; color:#888; margin-top:2px; }
.btn { display:block; width:100%; max-width:420px; margin:0 auto 12px; font-family:'Cairo',sans-serif; font-size:1rem; font-weight:700; padding:15px; border:none; border-radius:14px; cursor:pointer; transition:all 0.2s; }
.btn-red { background:linear-gradient(135deg,#e50914,#c40812); color:#fff; }
.btn-red:disabled { background:#333; color:#666; cursor:not-allowed; }
.btn-green { background:linear-gradient(135deg,#1db954,#169c45); color:#fff; }
.btn-green:disabled { background:#222; color:#555; cursor:not-allowed; }
.progress-wrap { max-width:420px; margin:0 auto 20px; display:none; }
.progress-wrap.show { display:block; }
.progress-label { text-align:center; color:#aaa; font-size:0.88rem; margin-bottom:8px; }
.bar-bg { background:#1a1a2e; border-radius:999px; height:10px; overflow:hidden; }
.bar-fill { height:100%; background:linear-gradient(90deg,#e50914,#ff6b35); border-radius:999px; transition:width 0.15s; width:0%; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; max-width:600px; margin:0 auto; }
.card { background:#111120; border:1px solid #1e1e30; border-radius:10px; overflow:hidden; }
.card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:#1a1a2e; }
.card-label { padding:6px 8px; font-size:0.75rem; color:#fff; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-status { padding:0 8px 6px; font-size:0.68rem; }
</style>
</head>
<body>
<h1>🎬 Fusion Collections</h1>
<p class="sub">تحميل كل الصور دفعة واحدة ZIP</p>

<div class="stats">
  <div class="stat"><div class="n" id="nTotal">0</div><div class="l">إجمالي</div></div>
  <div class="stat"><div class="n" id="nDone">0</div><div class="l">✅ تم</div></div>
  <div class="stat"><div class="n" id="nFail">0</div><div class="l">❌ فشل</div></div>
</div>

<button class="btn btn-red" id="btnStart" onclick="start()">🚀 تحميل وتحضير ZIP</button>
<button class="btn btn-green" id="btnDl" disabled onclick="downloadZip()">⬇️ تنزيل ZIP</button>

<div class="progress-wrap" id="pw">
  <div class="progress-label" id="pl">جاري التحميل...</div>
  <div class="bar-bg"><div class="bar-fill" id="bf"></div></div>
</div>

<div class="grid" id="grid"></div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/djdirty60/Fusion/refs/heads/main/collection/collections.json';
let zipBlob = null;
let collections = [];

async function loadCollections() {
  const res = await fetch(JSON_URL);
  const data = await res.json();
  return data.filter(c => c.backgroundImageURL);
}

async function fetchImageAsBlob(url) {
  try {
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error('Failed');
    const blob = await res.blob();
    return blob;
  } catch {
    return null;
  }
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

function getExt(url) {
  const match = url.match(/\.(jpg|jpeg|png|webp|avif)/i);
  return match ? match[1].toLowerCase() : 'jpg';
}

let nDone = 0, nFail = 0;

async function start() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('pw').classList.add('show');
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  nDone = 0; nFail = 0;

  // تحميل الـ JSON
  document.getElementById('pl').textContent = 'جاري تحميل القائمة...';
  collections = await loadCollections();
  const total = collections.length;
  document.getElementById('nTotal').textContent = total;

  const zip = new JSZip();
  const folder = zip.folder('fusion_collections');

  for (let i = 0; i < total; i++) {
    const item = collections[i];
    const url = item.backgroundImageURL;
    const name = item.name || item.id;
    const ext = getExt(url);
    const safeName = (item.id || name).replace(/[^a-zA-Z0-9._-]/g, '_');

    const blob = await fetchImageAsBlob(url);

    // card
    const div = document.createElement('div');
    div.className = 'card';

    if (blob) {
      nDone++;
      const objUrl = URL.createObjectURL(blob);
      div.innerHTML = `
        <img src="${objUrl}" loading="lazy">
        <div class="card-label">${name}</div>
        <div class="card-status" style="color:#44cc88">✅ تم</div>
      `;
      const b64 = await blobToBase64(blob);
      folder.file(`${safeName}.${ext}`, b64, { base64: true });
    } else {
      nFail++;
      div.innerHTML = `
        <div style="width:100%;aspect-ratio:2/3;background:#1a0a0a;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#888;">لا توجد صورة</div>
        <div class="card-label">${name}</div>
        <div class="card-status" style="color:#cc4444">❌ فشل</div>
      `;
    }

    grid.appendChild(div);

    const pct = Math.round(((i + 1) / total) * 100);
    document.getElementById('bf').style.width = pct + '%';
    document.getElementById('pl').textContent = `${i + 1} / ${total} — ${pct}%`;
    document.getElementById('nDone').textContent = nDone;
    document.getElementById('nFail').textContent = nFail;
  }

  document.getElementById('pl').textContent = `✅ انتهى! ${nDone} صورة جاهزة — اضغط تنزيل`;
  zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 4 } });
  document.getElementById('btnDl').disabled = false;
}

function downloadZip() {
  if (!zipBlob) return;
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fusion_collections.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}
</script>
</body>
</html>
